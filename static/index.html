<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nomeda — AI Therapist</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="ambient">
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
    <div class="ambient-blob blob-3"></div>
  </div>

  <div id="splash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#07070d;color:#e4e4ec;font-family:-apple-system,sans-serif;transition:opacity 0.6s">
    <div style="font-size:2rem;font-weight:700;margin-bottom:0.5rem;background:linear-gradient(135deg,#6366f1,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Nomeda</div>
    <div style="font-size:0.875rem;color:#7a7a8c" id="splashStatus">Loading...</div>
  </div>

  <!-- ═══ SCREEN 1: CHECK-IN ═══ -->
  <div id="screen-checkin" class="screen active">
    <button class="checkin-skip" id="skipBtn">
      <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 2l4 4-4 4"/>
        <path d="M3 11v-1a4 4 0 014-4h14"/>
      </svg>
      Skip
    </button>

    <div class="checkin-card fade-in">
      <div class="checkin-brand">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 4C9.373 4 4 9.373 4 16s5.373 12 12 12 12-5.373 12-12S22.627 4 16 4z"/>
          <path d="M12 14a2 2 0 100-4 2 2 0 000 4z"/>
          <path d="M20 14a2 2 0 100-4 2 2 0 000 4z"/>
          <path d="M16 20c-2.5 0-4-1.5-4-3h8c0 1.5-1.5 3-4 3z"/>
        </svg>
        <span>Nomeda</span>
      </div>

      <h1 class="checkin-title fade-in fade-in-d1">How are you feeling?</h1>

      <div class="emotion-grid fade-in fade-in-d2" id="emotionGrid"></div>

      <textarea class="checkin-textarea fade-in fade-in-d2" id="checkinText" placeholder="Want to say more? (optional)" rows="3"></textarea>

      <div class="checkin-voice fade-in fade-in-d3">
        <button class="voice-btn" id="checkinVoiceBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <span>Hold to record</span>
        </button>
        <div class="voice-status" id="checkinVoiceStatus"></div>
      </div>

      <button class="btn btn-primary checkin-continue fade-in fade-in-d4" id="continueBtn" disabled>
        <span id="continueBtnText">Continue</span>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ═══ SCREEN 2: CHAT ═══ -->
  <div id="screen-chat" class="screen">
    <header class="chat-header">
      <div class="connection">
        <span class="status-dot" id="headerStatusDot"></span>
        <span class="status-text" id="headerStatusText">Connecting</span>
      </div>
      <div class="voice-badge" id="voiceBadge">
        <span class="voice-badge-dot"></span>
        <span id="serLabel">Voice: --</span>
      </div>
      <div class="timer">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span id="timerDisplay">00:00</span>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="summaryBtn" title="Session Summary">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </button>
        <button class="btn btn-danger" id="endBtn">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
          <span id="endBtnText">End</span>
        </button>
      </div>
    </header>

    <div class="video-pip" id="videoPip">
      <div class="pip-header">
        <span class="pip-indicator"></span>
        <span>Camera</span>
        <button class="pip-close" id="pipToggle">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="pip-body">
        <video id="pipFeed" autoplay muted playsinline style="display:none; width:100%; height:100%; object-fit:cover;">
        <div class="pip-placeholder" id="pipPlaceholder">
          <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="face-area">
      <div class="face-controls">
        <!-- <div class="face-btns">
          <button class="face-btn active" id="faceNormalBtn">Normal</button>
          <button class="face-btn" id="faceHappyBtn">Happy</button>
          <button class="face-btn" id="faceSadBtn">Sad</button>
          <button class="face-btn" id="faceLovedBtn">Loved</button>
        </div> -->
        <!-- <label class="face-slider-row">
          <span>Anim</span>
          <input type="range" id="faceAnimSlider" min="100" max="2000" step="100" value="600">
          <span class="dur-val" id="faceAnimVal">600ms</span>
        </label> -->
      </div>
      <canvas id="robotFace" width="560" height="480"></canvas>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="chat-empty" id="chatEmpty">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
        </svg>
        <p>Your session is ready. How are you feeling?</p>
      </div>
    </div>

    <div class="timeline-bar" id="timelineBar">
      <button class="timeline-toggle" id="timelineToggle">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Emotion Timeline
        <span class="timeline-live" id="tlFaceLabel" style="margin-left:auto;"><span class="dot face"></span>Face: --</span>
        <span class="timeline-live" id="tlVoiceLabel"><span class="dot voice"></span>Voice: --</span>
        <svg class="icon-sm chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="timeline-content" id="timelineContent">
        <canvas id="timelineChart"></canvas>
      </div>
    </div>

    <div class="input-bar">
      <button class="btn-voice" id="chatVoiceBtn">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <input type="text" id="chatInput" placeholder="Type your message..." autocomplete="off">
      <button class="btn-send" id="sendBtn" disabled>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ═══ SCREEN 3: SUMMARY ═══ -->
  <div id="screen-summary" class="screen">
    <div class="summary-backdrop"></div>
    <div class="summary-modal" id="summaryModal">
      <div class="summary-header">
        <h2>Session Complete</h2>
        <p>Here's a summary of your session.</p>
      </div>

      <div class="summary-stats">
        <div class="stat-card">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <div class="stat-value" id="statDuration">00:00</div>
          <div class="stat-label">Duration</div>
        </div>
        <div class="stat-card">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
          <div class="stat-value" id="statMessages">0</div>
          <div class="stat-label">Messages</div>
        </div>
        <div class="stat-card">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
          </svg>
          <div class="stat-value" id="statAvgDistress">0</div>
          <div class="stat-label">Avg Distress</div>
        </div>
        <div class="stat-card">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="9" x2="9.01" y2="9"/>
            <line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
          <div class="stat-value" id="statDominant">&mdash;</div>
          <div class="stat-label">Dominant</div>
        </div>
      </div>

      <div class="summary-json">
        <div class="json-header">
          <span>Session Data (JSON)</span>
          <button id="copyBtn">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            <span id="copyBtnText">Copy</span>
          </button>
        </div>
        <pre id="jsonPreview">Loading...</pre>
      </div>

      <div class="summary-actions">
        <div class="summary-actions-row">
          <input type="email" id="emailInput" placeholder="your@email.com">
          <button class="btn btn-primary" id="sendSummaryBtn">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <span id="sendSummaryText">Send Summary</span>
          </button>
        </div>
        <div class="summary-actions-row">
          <button class="btn btn-download" id="downloadBtn">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span id="downloadBtnText">Download Report</span>
          </button>
        </div>
        <div class="summary-actions-row">
          <button class="btn btn-secondary" id="homeBtn">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Back to Home
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/ui.js?v=2"></script>
  <script src="/static/js/media.js?v=2"></script>
  <script src="/static/js/face.js?v=2"></script>
  <script src="/static/js/chart.min.js?v=2" defer></script>
  <script src="/static/js/app.js?v=2"></script>
</body>
</html>
